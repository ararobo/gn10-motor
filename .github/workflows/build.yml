name: CI Build

# main へのプッシュ・PR・手動実行でビルドチェックを行う
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

# リポジトリ読み取りのみ許可
permissions:
  contents: read

defaults:
  run:
    shell: bash

# 同一ブランチへの連続プッシュ時は古いジョブをキャンセルしてリソースを節約する
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: Check Format
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4

    - name: Install clang-format
      run: |
        sudo apt-get update
        sudo apt-get install -y clang-format

    # CubeMX生成ファイル(Core/)とサブモジュール(external/)は除外する
    - name: Check formatting
      run: >
        find gn10_motor targets/HTMDv2.2c-f303/app targets/HTMDv2.2c-g431/app targets/HTMDv2.2s/app
        \( -name "*.cpp" -o -name "*.hpp" -o -name "*.c" -o -name "*.h" \)
        | xargs clang-format --dry-run --Werror

  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-22.04
    strategy:
      # 一つのターゲットが失敗しても他のターゲットは続行する
      fail-fast: false
      # サポートする全ボードを並列ビルドする
      matrix:
        target: [HTMDv2.2c-f303, HTMDv2.2c-g431, HTMDv2.2s]

    steps:
    - uses: actions/checkout@v4
      with:
        # 外部ライブラリ(gn10_can 等)をサブモジュールとして取得する
        submodules: recursive

    - name: Install Arm Toolchain
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-arm-none-eabi libnewlib-arm-none-eabi ninja-build

    # ビルドキャッシュ: ターゲットごとにキーを分けて他ターゲットのキャッシュと混在させない
    - name: Setup ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: ${{ matrix.target }}
        variant: ccache

    # CMakePresets.json の <target>-release プリセットを使用してコンフィグ・ビルドする
    - name: Configure CMake
      run: cmake --preset ${{ matrix.target }}-release

    - name: Build
      run: cmake --build --preset ${{ matrix.target }}-release

    # プリセット使用時はビルド出力が build/<preset-name>/ 以下に生成されるため再帰パターンで収集する
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: firmware-${{ matrix.target }}
        path: |
          build/**/*.bin
          build/**/*.elf