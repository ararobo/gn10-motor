name: Release Firmware

on:
  push:
    tags:
      - 'v*'

defaults:
  run:
    shell: bash

# ワークフロー全体のデフォルト権限を最小化する
permissions: {}

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        target: [f303, g431]

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        submodules: recursive

    - name: Install Arm Toolchain
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-arm-none-eabi libnewlib-arm-none-eabi ninja-build

    - name: Setup ccache
      uses: hendrikmuhs/ccache-action@5ebbd400eff9e74630f759d94ddd7b6c26299639 # v1.2
      with:
        key: release-${{ matrix.target }}
        variant: ccache

    - name: Configure CMake
      run: >
        cmake -S . -B build
        -G Ninja
        -DCMAKE_TOOLCHAIN_FILE=targets/HTMDv2.2c-${{ matrix.target }}/cmake/gcc-arm-none-eabi.cmake
        -DTARGET_BOARD=${{ matrix.target }}
        -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --config Release

    # 次のreleaseジョブに渡すため、一時的にアーティファクトとして保存する
    - name: Upload Build Artifacts
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: firmware-${{ matrix.target }}
        path: |
          build/*.bin
          build/**/*.elf

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
    # 全matrixジョブの成果物を一つのディレクトリにまとめて展開する
    - name: Download All Firmware
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
      with:
        path: firmware
        merge-multiple: true

    - name: Create GitHub Release
      uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
      with:
        generate_release_notes: true
        files: firmware/**
